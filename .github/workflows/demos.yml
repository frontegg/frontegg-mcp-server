name: Rebuild demo GIFs

# Runs whenever the demo CLI, tape files, or dispatcher change.
# Regenerates all terminal GIFs under docs/demos/ with charmbracelet/vhs
# and opens a PR with the updated assets.

on:
  push:
    branches: [master]
    paths:
      - 'src/demo.ts'
      - 'src/tools/dispatcher.ts'
      - 'src/tools/platforms/**'
      - 'src/tools/diffs/**'
      - 'src/knowledge/**'
      - 'docs/demos/tapes/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-demos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # We intentionally skip `npm run build` — the demo CLI runs through
      # `tsx` (on-the-fly transpile). The demo's import graph is clean even
      # though some unrelated tool files in the project still carry legacy
      # TS strict-mode errors.

      - name: Install VHS + dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd fonts-dejavu fonts-firacode
          VHS_VERSION=0.8.0
          curl -sSL -o vhs.deb \
            "https://github.com/charmbracelet/vhs/releases/download/v${VHS_VERSION}/vhs_${VHS_VERSION}_amd64.deb"
          sudo dpkg -i vhs.deb
          vhs --version

      - name: Rebuild demo GIFs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run demos:build

      - name: Create PR with updated demos
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(demos): rebuild terminal GIFs'
          title: 'chore(demos): rebuild terminal GIFs'
          body: 'Auto-generated by `.github/workflows/demos.yml`.'
          branch: chore/rebuild-demos
          add-paths: |
            docs/demos/*.gif
