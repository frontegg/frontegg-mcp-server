<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 580" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bgL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0d10"/><stop offset="1" stop-color="#0a0b0e"/>
    </linearGradient>
    <linearGradient id="accL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#06b6d4"/><stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shL" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="1100" height="580" fill="#05060a"/>
  <g filter="url(#shL)">
    <rect x="40" y="30" width="1020" height="520" rx="14" fill="url(#bgL)" stroke="#1f2937"/>
    <rect x="40" y="30" width="1020" height="40" rx="14" fill="#0f1217"/>
    <rect x="40" y="60" width="1020" height="10" fill="#0f1217"/>
    <circle cx="68"  cy="50" r="6" fill="#ff5f57"/>
    <circle cx="88"  cy="50" r="6" fill="#febc2e"/>
    <circle cx="108" cy="50" r="6" fill="#28c840"/>
    <text x="550" y="55" font-size="12" fill="#64748b" text-anchor="middle" font-weight="500">Cursor  ·  frontegg-support MCP</text>
    <rect x="40" y="70" width="4" height="480" fill="url(#accL)" opacity="0.7"/>

    <g transform="translate(640, 94)">
      <text x="390" y="0" font-size="11" fill="#64748b" text-anchor="end" font-weight="700" letter-spacing="0.3">YOU</text>
      <rect x="0" y="10" width="390" height="38" rx="10" fill="#1e293b" stroke="#334155"/>
      <text x="18" y="34" font-size="13" fill="#e2e8f0">What rules does the MCP actually check?</text>
    </g>

    <g transform="translate(70, 158)">
      <circle cx="13" cy="13" r="13" fill="url(#accL)"/>
      <text x="13" y="18" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">F</text>
      <text x="34" y="18" font-size="12" fill="#94a3b8" font-weight="700" letter-spacing="0.3">FRONTEGG SUPPORT MCP</text>

      <rect x="0" y="34" width="960" height="362" rx="12" fill="#0f172a" stroke="#1f2937"/>

      <text x="20" y="66" font-size="16" fill="#f1f5f9" font-weight="700">Rule catalog — 30 static + dynamic from SDK READMEs</text>
      <text x="20" y="86" font-size="12" fill="#94a3b8">Dynamic rules are pulled live from each SDK repo's Troubleshooting section, so the catalog stays fresh.</text>
      <line x1="20" y1="102" x2="940" y2="102" stroke="#1e293b"/>

      <!-- 4 flow columns -->
      <g font-size="12">
        <!-- deep-link column -->
        <text x="20" y="128" font-size="11" fill="#a5b4fc" font-weight="700" letter-spacing="0.5">DEEP-LINK</text>
        <text x="20" y="150" fill="#e2e8f0">• android.intentFilter.missing</text>
        <text x="20" y="168" fill="#e2e8f0">• ios.urlTypes.missing</text>
        <text x="20" y="186" fill="#e2e8f0">• ios.associatedDomains.missing</text>
        <text x="20" y="204" fill="#e2e8f0">• rn.android.intentFilter.missing</text>
        <text x="20" y="222" fill="#e2e8f0">• rn.ios.urlTypes.missing</text>
        <text x="20" y="240" fill="#e2e8f0">• ionic.android.intentFilter.missing</text>
        <text x="20" y="258" fill="#e2e8f0">• ionic.ios.urlTypes.missing</text>

        <!-- init column -->
        <text x="250" y="128" font-size="11" fill="#a5b4fc" font-weight="700" letter-spacing="0.5">INIT</text>
        <text x="250" y="150" fill="#e2e8f0">• flutter.init.missing</text>
        <text x="250" y="168" fill="#e2e8f0">• rn.init.missing</text>
        <text x="250" y="186" fill="#e2e8f0">• ionic.capacitorConfig.plugin.missing</text>
        <text x="250" y="204" fill="#e2e8f0">• ionic.capacitorConfig.missing</text>

        <!-- build column -->
        <text x="500" y="128" font-size="11" fill="#a5b4fc" font-weight="700" letter-spacing="0.5">BUILD</text>
        <text x="500" y="150" fill="#e2e8f0">• android.sdk.dependency.missing</text>
        <text x="500" y="168" fill="#e2e8f0">• android.internetPermission.missing</text>
        <text x="500" y="186" fill="#e2e8f0">• android.gradle.appId.missing</text>
        <text x="500" y="204" fill="#e2e8f0">• ios.sdk.dependency.missing</text>
        <text x="500" y="222" fill="#e2e8f0">• rn.ios.podfile.useFrameworks.missing</text>
        <text x="500" y="240" fill="#e2e8f0">• flutter.dependency.missing</text>
        <text x="500" y="258" fill="#e2e8f0">• flutter.dependency.versionDrift</text>

        <!-- env+security column -->
        <text x="760" y="128" font-size="11" fill="#a5b4fc" font-weight="700" letter-spacing="0.5">SECURITY &amp; ENV</text>
        <text x="760" y="150" fill="#e2e8f0">• common.env.missing</text>
        <text x="760" y="168" fill="#e2e8f0">• common.baseUrl.insecure</text>
        <text x="760" y="186" fill="#e2e8f0">• common.env.gitignore.missing</text>
        <text x="760" y="204" fill="#e2e8f0">• ios.ats.httpUrl</text>
      </g>

      <line x1="20" y1="288" x2="940" y2="288" stroke="#1e293b"/>

      <text x="20" y="310" font-size="11" fill="#64748b" font-weight="700" letter-spacing="0.5">DYNAMIC · MERGED FROM SDK READMES AT RUNTIME</text>
      <text x="20" y="330" font-size="12" fill="#94a3b8">flutter.knownIssue.*   rn.knownIssue.*   ionic.knownIssue.*   android-kotlin.knownIssue.*   ios-swift.knownIssue.*</text>
      <text x="20" y="350" font-size="12" fill="#64748b">(auto-refreshed every 6h from github.com/frontegg/*)</text>

      <line x1="20" y1="366" x2="940" y2="366" stroke="#1e293b"/>
      <text x="20" y="386" font-size="11" fill="#475569"><tspan font-weight="700" fill="#64748b">TIP  </tspan>Call <tspan font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#a5b4fc">explain_finding</tspan> on any rule id for troubleshooting steps.</text>
    </g>
  </g>
</svg>
