<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bgI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0d10"/><stop offset="1" stop-color="#0a0b0e"/>
    </linearGradient>
    <linearGradient id="accI" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="shI" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="1100" height="620" fill="#05060a"/>
  <g filter="url(#shI)">
    <rect x="40" y="30" width="1020" height="560" rx="14" fill="url(#bgI)" stroke="#1f2937"/>
    <rect x="40" y="30" width="1020" height="40" rx="14" fill="#0f1217"/>
    <rect x="40" y="60" width="1020" height="10" fill="#0f1217"/>
    <circle cx="68"  cy="50" r="6" fill="#ff5f57"/>
    <circle cx="88"  cy="50" r="6" fill="#febc2e"/>
    <circle cx="108" cy="50" r="6" fill="#28c840"/>
    <text x="550" y="55" font-size="12" fill="#64748b" text-anchor="middle" font-weight="500">Claude  ·  frontegg-support MCP</text>
    <rect x="40" y="70" width="4" height="520" fill="url(#accI)" opacity="0.6"/>

    <!-- user -->
    <g transform="translate(530, 94)">
      <text x="500" y="0" font-size="11" fill="#64748b" text-anchor="end" font-weight="700" letter-spacing="0.3">YOU</text>
      <rect x="0" y="10" width="500" height="74" rx="10" fill="#1e293b" stroke="#334155"/>
      <text x="18" y="34" font-size="13" fill="#e2e8f0">My Ionic app opens Safari after login instead of</text>
      <text x="18" y="52" font-size="13" fill="#e2e8f0">coming back to the app. Fix it.</text>
      <text x="18" y="72" font-size="13" fill="#94a3b8" font-style="italic">~/code/ionic-store</text>
    </g>

    <!-- assistant -->
    <g transform="translate(70, 198)">
      <circle cx="13" cy="13" r="13" fill="url(#accI)"/>
      <text x="13" y="18" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">F</text>
      <text x="34" y="18" font-size="12" fill="#94a3b8" font-weight="700" letter-spacing="0.3">FRONTEGG SUPPORT MCP</text>

      <rect x="0" y="34" width="960" height="360" rx="12" fill="#0f172a" stroke="#1f2937"/>

      <text x="20" y="66" font-size="16" fill="#f1f5f9" font-weight="700">Frontegg Auto Report</text>
      <text x="20" y="86" font-size="12" fill="#94a3b8">Detected SDK: <tspan fill="#a5b4fc" font-weight="600">ionic-capacitor v1.1.0</tspan>    ·    Canonical: <tspan fill="#818cf8">github.com/frontegg/frontegg-ionic-capacitor</tspan></text>
      <line x1="20" y1="102" x2="940" y2="102" stroke="#1e293b"/>

      <text x="20" y="128" font-size="11" fill="#64748b" font-weight="700" letter-spacing="0.5">FINDINGS · DEEP-LINK &amp; INIT</text>

      <!-- f1 plugin missing -->
      <rect x="20" y="140" width="920" height="50" rx="8" fill="#1a0f1a" stroke="#450a0a"/>
      <rect x="20" y="140" width="4" height="50" rx="2" fill="#f87171"/>
      <text x="38" y="160" font-size="10" fill="#f87171" font-weight="700" letter-spacing="0.5">HIGH</text>
      <text x="80" y="160" font-size="13" fill="#f1f5f9" font-weight="600">FronteggNative plugin block missing from capacitor.config.ts</text>
      <text x="38" y="180" font-size="11" fill="#94a3b8">capacitor.config.ts</text>

      <!-- f2 android intent -->
      <rect x="20" y="200" width="920" height="50" rx="8" fill="#1a0f1a" stroke="#450a0a"/>
      <rect x="20" y="200" width="4" height="50" rx="2" fill="#f87171"/>
      <text x="38" y="220" font-size="10" fill="#f87171" font-weight="700" letter-spacing="0.5">HIGH</text>
      <text x="80" y="220" font-size="13" fill="#f1f5f9" font-weight="600">Ionic Android — missing intent-filter under MainActivity</text>
      <text x="38" y="240" font-size="11" fill="#94a3b8">android/app/src/main/AndroidManifest.xml</text>

      <!-- f3 ios url types -->
      <rect x="20" y="260" width="920" height="50" rx="8" fill="#1a0f1a" stroke="#450a0a"/>
      <rect x="20" y="260" width="4" height="50" rx="2" fill="#f87171"/>
      <text x="38" y="280" font-size="10" fill="#f87171" font-weight="700" letter-spacing="0.5">HIGH</text>
      <text x="80" y="280" font-size="13" fill="#f1f5f9" font-weight="600">Ionic iOS — CFBundleURLTypes not declared</text>
      <text x="38" y="300" font-size="11" fill="#94a3b8">ios/App/App/Info.plist</text>

      <!-- diff summary -->
      <text x="20" y="340" font-size="11" fill="#64748b" font-weight="700" letter-spacing="0.5">3 READY-TO-APPLY DIFFS</text>
      <rect x="20" y="352" width="920" height="28" rx="6" fill="#0a0e18" stroke="#1e293b"/>
      <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">
        <text x="36" y="371" fill="#4ade80">+ FronteggNative { baseUrl, clientId, applicationId }  </text>
        <text x="396" y="371" fill="#4ade80">+ &lt;intent-filter&gt;…  </text>
        <text x="556" y="371" fill="#4ade80">+ &lt;CFBundleURLTypes&gt;…</text>
      </g>
    </g>

    <text x="70" y="575" font-size="11" fill="#475569"><tspan font-weight="700" fill="#64748b">EVIDENCE  </tspan>3 rules applied · snippets from frontegg-ionic-capacitor/example/ · fetched live from github.com</text>
  </g>
</svg>
